<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdadero o Falso - Historia de las Computadoras</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

    <h1>💻 Historia de las Computadoras</h1>

    <div class="topbar">
        <div>❤️ Vidas: <span id="vidas">3</span></div>
        <div>⭐ Puntos: <span id="puntos">0</span></div>
        <div>⏱️ <span id="timer">10</span>s</div>
    </div>

    <div class="question-card">

        <h2 id="pregunta">
            Cargando...
        </h2>

        <div class="buttons">

            <button class="trueBtn" onclick="responder(true)">
                ✅ VERDADERO
            </button>

            <button class="falseBtn" onclick="responder(false)">
                ❌ FALSO
            </button>

        </div>

        <div id="mensaje"></div>

    </div>

</div>

<div id="finalScreen" class="hidden">

    <div class="finalCard">

        <h1>🏆 Juego Finalizado</h1>

        <h2 id="medalla"></h2>

        <p id="resultadoFinal"></p>

        <button onclick="location.reload()">
            🔄 Jugar Otra Vez
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
